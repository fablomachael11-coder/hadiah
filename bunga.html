<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bunga Untuk Kamu</title>

<style>

body{
background:linear-gradient(135deg,#ffd6e7,#ffeaf4);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
font-family:Arial;
}

h1{
color:#ff2e63;
margin-bottom:40px;
}

/* bunga */

.flower{
position:relative;
width:200px;
height:200px;
}

.petal{
position:absolute;
width:80px;
height:80px;
background:#ff4d6d;
border-radius:50%;
opacity:0;
animation:bloom 2s forwards;
}

.petal:nth-child(1){
top:0;
left:60px;
animation-delay:0.3s;
}

.petal:nth-child(2){
left:120px;
top:60px;
animation-delay:0.6s;
}

.petal:nth-child(3){
top:120px;
left:60px;
animation-delay:0.9s;
}

.petal:nth-child(4){
left:0;
top:60px;
animation-delay:1.2s;
}

.center{
position:absolute;
top:70px;
left:70px;
width:60px;
height:60px;
background:#ffd166;
border-radius:50%;
opacity:0;
animation:bloom 2s forwards 1.5s;
}

@keyframes bloom{
from{
transform:scale(0);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}
}

button{
margin-top:40px;
padding:14px 30px;
border:none;
border-radius:25px;
background:#ff2e63;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Bunga Ini Untuk Kamu 🌸</h1>

<div class="flower">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="center"></div>
</div>

<a href="pesan.html">
<button>Buka Pesan 💌</button>
</a>

</body>
</html>
